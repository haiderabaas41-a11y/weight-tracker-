<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight & Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="app" class="max-w-2xl mx-auto p-6">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Weight & Workout Tracker</h1>
            <p class="text-gray-600 mt-2">Track your progress, one workout at a time</p>
        </div>

        <div id="tabs" class="flex gap-4 mb-6 border-b border-gray-200">
            <button onclick="switchTab('dashboard')" class="pb-3 px-2 font-medium border-b-2 border-gray-900 text-gray-900">Dashboard</button>
            <button onclick="switchTab('weight')" class="pb-3 px-2 font-medium text-gray-600">Weight Log</button>
            <button onclick="switchTab('workouts')" class="pb-3 px-2 font-medium text-gray-600">Workouts</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let data = {
            weights: JSON.parse(localStorage.getItem('weights') || '[]'),
            workouts: JSON.parse(localStorage.getItem('workouts') || '[]'),
            currentTab: 'dashboard'
        };

        function save() {
            localStorage.setItem('weights', JSON.stringify(data.weights));
            localStorage.setItem('workouts', JSON.stringify(data.workouts));
        }

        function switchTab(tab) {
            data.currentTab = tab;
            updateTabs();
            render();
        }

        function updateTabs() {
            document.querySelectorAll('#tabs button').forEach((btn, i) => {
                const tabs = ['dashboard', 'weight', 'workouts'];
                if (tabs[i] === data.currentTab) {
                    btn.className = 'pb-3 px-2 font-medium border-b-2 border-gray-900 text-gray-900';
                } else {
                    btn.className = 'pb-3 px-2 font-medium text-gray-600';
                }
            });
        }

        function addWeight() {
            const date = document.getElementById('weightDate').value;
            const weight = parseFloat(document.getElementById('weightValue').value);
            if (date && weight) {
                data.weights.push({date, weight});
                save();
                document.getElementById('weightDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('weightValue').value = '';
                render();
            }
        }

        function addWorkout() {
            const date = document.getElementById('workoutDate').value;
            const exercise = document.getElementById('exercise').value;
            const sets = parseInt(document.getElementById('sets').value);
            const reps = parseInt(document.getElementById('reps').value);
            const weight = parseFloat(document.getElementById('workoutWeight').value);
            if (date && exercise && sets && reps && weight) {
                data.workouts.push({date, exercise, sets, reps, weight});
                save();
                document.getElementById('exercise').value = '';
                document.getElementById('sets').value = '';
                document.getElementById('reps').value = '';
                document.getElementById('workoutWeight').value = '';
                document.getElementById('workoutDate').value = new Date().toISOString().split('T')[0];
                render();
            }
        }

        function formatDate(d) {
            return new Date(d).toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
        }

        function render() {
            const sorted = [...data.weights].sort((a,b) => new Date(b.date) - new Date(a.date));
            const wSorted = [...data.workouts].sort((a,b) => new Date(b.date) - new Date(a.date));
            const current = sorted[0]?.weight || null;
            const prev = sorted[1]?.weight || null;
            const trend = current && prev ? (current - prev).toFixed(1) : 0;
            const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
            const thisWeek = wSorted.filter(w => new Date(w.date) >= weekAgo).length;

            let html = '';

            if (data.currentTab === 'dashboard') {
                html += '<div class="space-y-6"><div class="grid grid-cols-2 gap-4">';
                html += `<div class="bg-white p-6 rounded-lg border border-gray-200"><p class="text-gray-600 text-sm mb-2">Current Weight</p><p class="text-2xl font-bold text-gray-900">${current ? current + ' kg' : '—'}</p></div>`;
                html += `<div class="bg-white p-6 rounded-lg border border-gray-200"><p class="text-gray-600 text-sm mb-2">Trend</p><p class="text-2xl font-bold text-gray-900">${trend === 0 ? '—' : trend + ' kg'}</p></div>`;
                html += `<div class="bg-white p-6 rounded-lg border border-gray-200"><p class="text-gray-600 text-sm mb-2">Workouts This Week</p><p class="text-2xl font-bold text-gray-900">${thisWeek}</p></div>`;
                html += `<div class="bg-white p-6 rounded-lg border border-gray-200"><p class="text-gray-600 text-sm mb-2">Total Entries</p><p class="text-2xl font-bold text-gray-900">${data.weights.length + data.workouts.length}</p></div>`;
                html += '</div>';
                if (wSorted[0]) {
                    html += `<div class="bg-white p-6 rounded-lg border border-gray-200"><h3 class="font-semibold text-gray-900 mb-3">Latest Workout</h3><p><span class="font-medium">Exercise:</span> ${wSorted[0].exercise}</p><p><span class="font-medium">Sets × Reps:</span> ${wSorted[0].sets} × ${wSorted[0].reps}</p><p><span class="font-medium">Weight:</span> ${wSorted[0].weight} kg</p></div>`;
                }
                html += '</div>';
            }

            else if (data.currentTab === 'weight') {
                html += '<div class="space-y-6"><div class="bg-white p-6 rounded-lg border border-gray-200"><h3 class="font-semibold text-gray-900 mb-4">Add Weight</h3>';
                html += `<div class="space-y-3"><div><label class="block text-sm font-medium text-gray-700 mb-1">Date</label><input type="date" id="weightDate" value="${new Date().toISOString().split('T')[0]}" class="w-full px-3 py-2 border border-gray-300 rounded-lg"></div>`;
                html += `<div><label class="block text-sm font-medium text-gray-700 mb-1">Weight (kg)</label><input type="number" id="weightValue" step="0.1" placeholder="70.5" class="w-full px-3 py-2 border border-gray-300 rounded-lg"></div>`;
                html += `<button onclick="addWeight()" class="w-full bg-gray-900 text-white py-2 rounded-lg font-medium">Add Weight</button></div></div>`;
                html += '<div class="bg-white rounded-lg border border-gray-200 overflow-hidden"><div class="p-6 border-b border-gray-200"><h3 class="font-semibold text-gray-900">History</h3></div><div class="divide-y divide-gray-200">';
                sorted.forEach(e => {
                    html += `<div class="p-4 flex justify-between"><span class="text-gray-600 text-sm">${formatDate(e.date)}</span><span class="font-semibold">${e.weight} kg</span></div>`;
                });
                html += '</div></div></div>';
            }

            else if (data.currentTab === 'workouts') {
                html += '<div class="space-y-6"><div class="bg-white p-6 rounded-lg border border-gray-200"><h3 class="font-semibold text-gray-900 mb-4">Log Workout</h3>';
                html += `<div class="space-y-3"><div><input type="date" id="workoutDate" value="${new Date().toISOString().split('T')[0]}" class="w-full px-3 py-2 border border-gray-300 rounded-lg"></div>`;
                html += `<input type="text" id="exercise" placeholder="Exercise" class="w-full px-3 py-2 border border-gray-300 rounded-lg"><div class="grid grid-cols-3 gap-3">`;
                html += `<input type="number" id="sets" placeholder="Sets" class="px-3 py-2 border border-gray-300 rounded-lg"><input type="number" id="reps" placeholder="Reps" class="px-3 py-2 border border-gray-300 rounded-lg"><input type="number" id="workoutWeight" placeholder="Weight" step="0.5" class="px-3 py-2 border border-gray-300 rounded-lg"></div>`;
                html += `<button onclick="addWorkout()" class="w-full bg-gray-900 text-white py-2 rounded-lg font-medium">Save Workout</button></div></div>`;
                html += '<div class="bg-white rounded-lg border border-gray-200 overflow-hidden"><div class="p-6 border-b border-gray-200"><h3 class="font-semibold text-gray-900">History</h3></div><div class="divide-y divide-gray-200">';
                wSorted.forEach(w => {
                    html += `<div class="p-4"><div class="flex justify-between mb-2"><span class="font-semibold">${w.exercise}</span><span class="text-gray-500 text-xs">${formatDate(w.date)}</span></div><p class="text-gray-600 text-sm">${w.sets} × ${w.reps} @ ${w.weight} kg</p></div>`;
                });
                html += '</div></div></div>';
            }

            document.getElementById('content').innerHTML = html;
        }

        render();
    </script>
</body>
</html>
